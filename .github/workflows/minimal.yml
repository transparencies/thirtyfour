on:
  push:
    branches: [main]
  pull_request:
name: With dependencies at minimal versions
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
      - uses: actions/checkout@v2
      # No driver install step: tests use `WebDriver::managed`, which downloads
      # and lifetime-manages chromedriver / geckodriver itself. The browsers
      # themselves are pre-installed on GitHub-hosted runners.
      - name: cargo update -Zminimal-versions
        uses: actions-rs/cargo@v1
        with:
          command: update
          toolchain: nightly
          args: -Zminimal-versions
      - name: cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
